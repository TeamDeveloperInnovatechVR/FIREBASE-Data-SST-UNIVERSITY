<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SST UNIVERSITY · Analítica</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ===== ESTILO COMPLETO DEL DASHBOARD (neón oscuro) ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0D0E12;
      min-height: 100vh;
      color: #FFFFFF;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 30%, rgba(22, 27, 51, 0.6) 0%, #0D0E12 90%);
      pointer-events: none;
      z-index: -1;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: -1;
    }
    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }
    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(22, 27, 51, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 242, 255, 0.3);
      padding: 12px 24px;
      margin-bottom: 30px;
      border-radius: 12px;
    }
    .header img {
      height: 50px;
      margin-right: 16px;
    }
    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #00F2FF, #7000FF);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    /* PANELES */
    .panel {
      background: rgba(22, 27, 51, 0.6);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(0, 242, 255, 0.2);
      padding: 25px;
      margin-bottom: 30px;
      border-radius: 12px;
    }
    .panel h2 {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      color: #00F2FF;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(0, 242, 255, 0.3);
      padding-bottom: 8px;
    }
    .panel h3 {
      color: #A0D8EF;
      font-weight: 500;
      margin-bottom: 12px;
    }
    /* INPUTS Y BOTONES */
    .input-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .input-group input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(13, 14, 18, 0.8);
      border: 1px solid #00F2FF;
      color: #fff;
      font-family: 'Inter', monospace;
      font-size: 1rem;
      border-radius: 8px;
      min-width: 200px;
    }
    .input-group input:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
    }
    .btn-primary {
      background: #00F2FF;
      border: none;
      color: #0D0E12;
      padding: 12px 28px;
      font-family: 'Orbitron', monospace;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: #7000FF;
      color: white;
      box-shadow: 0 0 20px rgba(112, 0, 255, 0.5);
    }
    .btn-device {
      background: rgba(22, 27, 51, 0.6);
      border: 1px solid #00F2FF;
      color: #A0D8EF;
      padding: 8px 20px;
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 6px;
      margin: 4px;
      width: 100%;
      text-align: left;
    }
    .btn-device:hover {
      background: #00F2FF;
      color: #0D0E12;
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
    }
    .btn-device.active {
      background: #00F2FF;
      color: #0D0E12;
    }
    /* SELECTOR DE AÑO */
    .year-selector {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 12px 0;
    }
    .year-selector select {
      padding: 8px 16px;
      background: rgba(13, 14, 18, 0.8);
      border: 1px solid #00F2FF;
      color: white;
      border-radius: 6px;
      font-family: 'Inter', monospace;
      cursor: pointer;
    }
    /* GRILLA DE GRÁFICOS */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-top: 20px;
    }
    .chart-box {
      background: rgba(13, 14, 18, 0.5);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid rgba(0, 242, 255, 0.15);
    }
    .chart-box h4 {
      color: #A0D8EF;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .chart-container {
      height: 250px;
      width: 100%;
    }
    /* LISTA DE DISPOSITIVOS */
    .device-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 6px;
    }
    .device-list::-webkit-scrollbar {
      width: 6px;
    }
    .device-list::-webkit-scrollbar-track {
      background: rgba(13, 14, 18, 0.3);
      border-radius: 10px;
    }
    .device-list::-webkit-scrollbar-thumb {
      background: #00F2FF;
      border-radius: 10px;
    }
    /* DETALLE DE DISPOSITIVO */
    .device-detail {
      margin-top: 20px;
      border-top: 1px solid rgba(0, 242, 255, 0.2);
      padding-top: 20px;
    }
    .training-item {
      background: rgba(13, 14, 18, 0.4);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      border-left: 3px solid #00F2FF;
    }
    .training-item .training-name {
      font-weight: 600;
      color: #00F2FF;
    }
    .training-item .year-toggle {
      cursor: pointer;
      color: #A0D8EF;
      margin-left: 12px;
      font-size: 0.8rem;
    }
    .training-item .year-toggle:hover {
      color: #00F2FF;
    }
    .month-details {
      margin-top: 8px;
      padding-left: 20px;
      font-size: 0.85rem;
      display: none;
    }
    .month-details.open {
      display: block;
    }
    .month-details p {
      margin: 2px 0;
    }
    .legend-custom {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      max-height: 150px;
      overflow-y: auto;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(13, 14, 18, 0.6);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
    }
    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 4px;
    }
    /* FOOTER */
    .footer {
      text-align: center;
      padding: 30px 0 10px;
      border-top: 1px solid rgba(0, 242, 255, 0.15);
      margin-top: 40px;
      color: #A0D8EF;
      font-size: 0.9rem;
    }
    .footer img {
      height: 40px;
      vertical-align: middle;
      margin-right: 8px;
    }
    .footer span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    /* OCULTAR */
    .hidden {
      display: none !important;
    }
    /* RESPONSIVE */
    @media (max-width: 768px) {
      .container { padding: 12px; }
      .header h1 { font-size: 1.1rem; }
      .charts-grid { grid-template-columns: 1fr; }
      .input-group { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <header class="header">
      <img src="Resources/AMB.svg" alt="Logo SST">
      <h1>SST UNIVERSITY ANALITICA</h1>
    </header>

    <!-- PANEL DE BÚSQUEDA -->
    <div class="panel">
      <h2><i class="fas fa-search"></i> CONSULTAR EMPRESA</h2>
      <div class="input-group">
        <input type="text" id="empresaInput" placeholder="Ej: PRUEBADATA" 
               oninput="this.value = this.value.toUpperCase()" style="text-transform:uppercase;">
        <button class="btn-primary" onclick="leerData()"><i class="fas fa-cloud-download-alt"></i> LEER DATA</button>
      </div>
      <div id="resultado" class="hidden" style="margin-top:20px;">
        <h3 style="color:#00F2FF;" id="nombreEmpresa"></h3>
      </div>
    </div>

    <!-- PANEL DE RESULTADOS (se muestra tras consulta) -->
    <div id="resultadosCompletos" class="hidden">
      <!-- Gráficos generales -->
      <div class="panel">
        <h2><i class="fas fa-chart-bar"></i> RANKING GENERAL POR CAPACITACIÓN</h2>
        <div class="chart-box">
          <div class="chart-container" style="height:300px;">
            <canvas id="barChartGeneral"></canvas>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2><i class="fas fa-chart-pie"></i> RESUMEN GLOBAL</h2>
        <div class="charts-grid">
          <div class="chart-box">
            <h4>⏱️ Uso por dispositivo</h4>
            <div class="chart-container"><canvas id="pieDispositivos"></canvas></div>
            <div id="legendDispositivos" class="legend-custom"></div>
          </div>
          <div class="chart-box">
            <h4>📚 Uso por capacitación</h4>
            <div class="chart-container"><canvas id="pieCapacitaciones"></canvas></div>
            <div id="legendCapacitaciones" class="legend-custom"></div>
          </div>
        </div>
      </div>

      <!-- LISTA DE DISPOSITIVOS -->
      <div class="panel">
        <h2><i class="fas fa-microchip"></i> DISPOSITIVOS REGISTRADOS</h2>
        <div id="dispositivosList" class="device-list"></div>
        <div id="detalleDispositivo" class="device-detail hidden"></div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <span>
        <img src="Resources/AMB.svg" alt="Ambiente Innovatech" style="height:30px;">
        <span>Ambiente Innovatech · Datos SST</span>
      </span>
    </div>
  </div>

  <script>
    const FIREBASE_URL = "https://sst-university-default-rtdb.firebaseio.com/Companies/";
    let charts = {};

    // ===== UTILIDADES =====
    function formatTiempo(segundos) {
      const h = Math.floor(segundos / 3600);
      const m = Math.floor((segundos % 3600) / 60);
      const s = segundos % 60;
      let str = '';
      if (h) str += `${h}h `;
      if (m) str += `${m}m `;
      str += `${s}s`;
      return str;
    }

    // Traducciones (puedes ampliarlas)
    const traducciones = {
      "RoadSecurity": "Seguridad Vial",
      "ConfinedSpaces": "Espacios Confinados",
      "Mines": "Minería",
      "PsychologicalHelp": "Ayuda Psicológica",
      "Hydrocarbons": "Hidrocarburos",
      "Quimic": "Químico",
      "RCP": "RCP",
      "ChemicalRisks": "Riesgos Químicos",
      "PsychoactiveSubstances": "Sustancias Psicoactivas",
      "EmergencyPlanAndExtinguishers": "Plan de Emergencia y Extintores",
      "WeaponsHandling": "Manejo de Armas",
      "HealthyLifestyleHabits": "Hábitos de Vida Saludable",
      "WorkingAtHeights": "Trabajo en Alturas",
      "PlantRisks": "Riesgos en Planta",
      "ExtinguisherAirport": "Extintores Aeropuerto",
      "MentalHealth": "Salud Mental",
      "ElectricalRiskLOTO": "Riesgo Eléctrico - LOTO",
      "Ergonomics": "Ergonomía",
      "PosturalHygiene": "Higiene Postural",
      "Scooter": "Patineta",
      "Bicycle": "Bicicleta",
      "TukTuk": "Tuk Tuk",
      "HandRisks": "Riesgos en Manos",
      "SameLevelFalls": "Caídas al Mismo Nivel",
      "ElevatedPlatforms": "Plataformas Elevadoras",
      "BiologicalRisk": "Riesgo Biológico",
      "Recycling": "Reciclaje",
      "PublicRisk": "Riesgo Público",
      "AirSafety": "Seguridad Aérea",
      "AirportVisualSafety": "Seguridad Vial Aeropuerto",
      "Machinery": "Maquinaria",
      "LoadHoisting": "Izado de Cargas",
      "TEST": "PRUEBA",
      "Tutorial": "Tutorial",
      "Nixus": "Nixus",
      "Nixus_RoadActors": "Actores Viales Nixus",
      "HydrocarbonsDerrickman": "Hidrocarburos Derrickman"
    };
    function traducir(nombre) { return traducciones[nombre] || nombre; }

    const mesesIngles = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const mesesEsp = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

    function traducirMes(mes) {
      const idx = mesesIngles.indexOf(mes);
      return idx !== -1 ? mesesEsp[idx] : mes;
    }

    // ===== OBTENER DATA =====
    async function leerData() {
      const empresa = document.getElementById('empresaInput').value.trim().toUpperCase();
      if (!empresa) { alert('Ingresa el nombre de la empresa'); return; }

      const url = `${FIREBASE_URL}${empresa}/devices.json`;
      try {
        const resp = await fetch(url);
        const data = await resp.json();
        if (!data || typeof data !== 'object') {
          alert('❌ No se encontraron dispositivos para esta empresa');
          return;
        }

        // Convertir objeto a array de dispositivos (cada uno con su ID)
        const dispositivos = Object.entries(data).map(([key, value]) => {
          // value contiene: accessCode, data, license, trainingsActive
          // El objeto data tiene: ID, Trainings, UsageTime
          const deviceData = value.data || {};
          return {
            id: key,
            accessCode: value.accessCode,
            license: value.license,
            trainingsActive: value.trainingsActive || [],
            // Datos de uso
            ID: deviceData.ID || key,
            Trainings: deviceData.Trainings || [],
            UsageTime: deviceData.UsageTime || 0
          };
        });

        if (dispositivos.length === 0) {
          alert('No hay dispositivos registrados');
          return;
        }

        // Mostrar resultados
        document.getElementById('resultado').classList.remove('hidden');
        document.getElementById('resultadosCompletos').classList.remove('hidden');
        document.getElementById('nombreEmpresa').textContent = `🏢 EMPRESA: ${empresa}`;

        // Procesar y mostrar gráficos
        renderGenerales(dispositivos);
        renderListaDispositivos(dispositivos);

      } catch (error) {
        console.error(error);
        alert('Error al obtener datos: ' + error.message);
      }
    }

    // ===== GRÁFICOS GENERALES =====
    function renderGenerales(dispositivos) {
      // 1. Sumar tiempos por capacitación (todos los dispositivos)
      const trainingTotals = {};
      dispositivos.forEach(dev => {
        (dev.Trainings || []).forEach(t => {
          const name = t.TrainingName;
          trainingTotals[name] = (trainingTotals[name] || 0) + (t.TotalTime || 0);
        });
      });

      const trainingNames = Object.keys(trainingTotals);
      const trainingValues = Object.values(trainingTotals);
      const colores = generarColores(trainingNames.length);

      // Gráfico de barras general
      const ctxBar = document.getElementById('barChartGeneral').getContext('2d');
      if (charts.barGeneral) charts.barGeneral.destroy();
      charts.barGeneral = new Chart(ctxBar, {
        type: 'bar',
        data: {
          labels: trainingNames.map(traducir),
          datasets: [{
            label: 'Tiempo total (seg)',
            data: trainingValues,
            backgroundColor: colores
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => formatTiempo(ctx.raw) } }
          },
          scales: {
            y: { beginAtZero: true, ticks: { callback: v => formatTiempo(v) } }
          }
        }
      });

      // 2. Gráfico de torta: dispositivos vs tiempo
      const devLabels = dispositivos.map(d => d.ID);
      const devValues = dispositivos.map(d => d.UsageTime || 0);
      const coloresDev = generarColores(devLabels.length);

      const ctxPieDev = document.getElementById('pieDispositivos').getContext('2d');
      if (charts.pieDispositivos) charts.pieDispositivos.destroy();
      charts.pieDispositivos = new Chart(ctxPieDev, {
        type: 'doughnut',
        data: {
          labels: devLabels,
          datasets: [{ data: devValues, backgroundColor: coloresDev }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } }
        }
      });
      // Leyenda personalizada
      const legendDev = document.getElementById('legendDispositivos');
      legendDev.innerHTML = devLabels.map((label, i) => `
        <div class="legend-item">
          <span class="legend-color" style="background:${coloresDev[i]}"></span>
          ${label} - ${formatTiempo(devValues[i])}
        </div>
      `).join('');

      // 3. Gráfico de torta: capacitaciones general
      const capLabels = trainingNames;
      const capValues = trainingValues;
      const coloresCap = generarColores(capLabels.length);

      const ctxPieCap = document.getElementById('pieCapacitaciones').getContext('2d');
      if (charts.pieCapacitaciones) charts.pieCapacitaciones.destroy();
      charts.pieCapacitaciones = new Chart(ctxPieCap, {
        type: 'doughnut',
        data: {
          labels: capLabels.map(traducir),
          datasets: [{ data: capValues, backgroundColor: coloresCap }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } }
        }
      });
      const legendCap = document.getElementById('legendCapacitaciones');
      legendCap.innerHTML = capLabels.map((label, i) => `
        <div class="legend-item">
          <span class="legend-color" style="background:${coloresCap[i]}"></span>
          ${traducir(label)} - ${formatTiempo(capValues[i])}
        </div>
      `).join('');
    }

    // ===== LISTA DE DISPOSITIVOS =====
    function renderListaDispositivos(dispositivos) {
      const container = document.getElementById('dispositivosList');
      container.innerHTML = '';
      dispositivos.forEach(dev => {
        const btn = document.createElement('button');
        btn.className = 'btn-device';
        btn.textContent = `📌 ${dev.ID}  (${formatTiempo(dev.UsageTime)})`;
        btn.onclick = () => mostrarDetalleDispositivo(dev, dispositivos);
        container.appendChild(btn);
      });
      // Limpiar detalle
      document.getElementById('detalleDispositivo').classList.add('hidden');
      document.getElementById('detalleDispositivo').innerHTML = '';
    }

    // ===== DETALLE DE DISPOSITIVO =====
    function mostrarDetalleDispositivo(dispositivo, todosLosDispositivos) {
      const detailDiv = document.getElementById('detalleDispositivo');
      detailDiv.classList.remove('hidden');
      detailDiv.innerHTML = '';

      // Obtener años disponibles en este dispositivo
      const añosSet = new Set();
      (dispositivo.Trainings || []).forEach(t => {
        (t.YearList || []).forEach(y => añosSet.add(y.Year));
      });
      const años = Array.from(añosSet).sort();

      // Selector de año
      const yearSelector = document.createElement('div');
      yearSelector.className = 'year-selector';
      yearSelector.innerHTML = `
        <label style="color:#A0D8EF;">📅 Año:</label>
        <select id="yearSelect"></select>
      `;
      const select = yearSelector.querySelector('select');
      años.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a;
        opt.textContent = a;
        select.appendChild(opt);
      });
      if (años.length) select.value = años[0];

      // Contenedor para gráfico mensual
      const chartContainer = document.createElement('div');
      chartContainer.style.margin = '16px 0';
      chartContainer.innerHTML = `<div class="chart-container" style="height:250px;"><canvas id="chartMensualDetalle"></canvas></div>`;

      // Contenedor para lista de trainings
      const trainingsContainer = document.createElement('div');
      trainingsContainer.id = 'trainingsDetalle';

      detailDiv.appendChild(yearSelector);
      detailDiv.appendChild(chartContainer);
      detailDiv.appendChild(trainingsContainer);

      // Función para actualizar gráfico y lista según año seleccionado
      function actualizarDetalle(año) {
        // 1. Gráfico mensual: sumar tiempos de todos los trainings para ese año
        const mesesMap = {};
        mesesIngles.forEach(m => mesesMap[m] = 0);
        (dispositivo.Trainings || []).forEach(t => {
          const yearData = (t.YearList || []).find(y => y.Year === año);
          if (yearData && yearData.Months) {
            Object.entries(yearData.Months).forEach(([mes, valor]) => {
              if (mesesMap[mes] !== undefined) mesesMap[mes] += valor;
            });
          }
        });
        const mesesLabels = mesesIngles.map(traducirMes);
        const mesesValues = mesesIngles.map(m => mesesMap[m] || 0);

        // Dibujar gráfico
        const ctx = document.getElementById('chartMensualDetalle').getContext('2d');
        if (charts.mensualDetalle) charts.mensualDetalle.destroy();
        charts.mensualDetalle = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: mesesLabels,
            datasets: [{
              label: `Tiempo total - ${año}`,
              data: mesesValues,
              backgroundColor: '#00F2FF'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, ticks: { callback: v => formatTiempo(v) } }
            }
          }
        });

        // 2. Lista de trainings con desglose
        trainingsContainer.innerHTML = '';
        (dispositivo.Trainings || []).forEach(t => {
          const div = document.createElement('div');
          div.className = 'training-item';
          const name = traducir(t.TrainingName);
          const total = formatTiempo(t.TotalTime || 0);
          div.innerHTML = `
            <div class="training-name">${name} <span style="font-weight:normal;color:#A0D8EF;">(${total})</span></div>
          `;
          // Mostrar años y meses de este training
          const yearList = t.YearList || [];
          yearList.forEach(yd => {
            const yearBtn = document.createElement('span');
            yearBtn.className = 'year-toggle';
            yearBtn.textContent = `📅 ${yd.Year}`;
            const monthDiv = document.createElement('div');
            monthDiv.className = 'month-details';
            // Mostrar meses con tiempo
            if (yd.Months) {
              let html = '';
              Object.entries(yd.Months).forEach(([mes, valor]) => {
                if (valor > 0) {
                  html += `<p>• ${traducirMes(mes)}: ${formatTiempo(valor)}</p>`;
                }
              });
              monthDiv.innerHTML = html || '<p style="color:#666;">Sin datos</p>';
            } else {
              monthDiv.innerHTML = '<p style="color:#666;">Sin datos</p>';
            }
            yearBtn.onclick = () => {
              monthDiv.classList.toggle('open');
            };
            div.appendChild(yearBtn);
            div.appendChild(monthDiv);
          });
          trainingsContainer.appendChild(div);
        });
      }

      // Evento change del selector
      select.addEventListener('change', () => {
        actualizarDetalle(select.value);
      });

      // Inicializar con el primer año
      if (años.length) actualizarDetalle(años[0]);
    }

    // ===== GENERAR COLORES =====
    function generarColores(n) {
      const paleta = [
        '#00F2FF', '#7000FF', '#FF6B6B', '#FFD93D', '#6BCB77', 
        '#4D96FF', '#9B59B6', '#F39C12', '#1ABC9C', '#E74C3C',
        '#3498DB', '#2ECC71', '#E67E22', '#9B59B6', '#1ABC9C'
      ];
      const colores = [];
      for (let i = 0; i < n; i++) {
        colores.push(paleta[i % paleta.length]);
      }
      return colores;
    }

    };
  </script>
